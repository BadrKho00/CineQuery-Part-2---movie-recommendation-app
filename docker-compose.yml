services:

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - .env
      # Mount your GCP service account key for local dev:
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp-key.json
    volumes:
      - ./gcp-key.json:/secrets/gcp-key.json:ro   # place your key file here
  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend
